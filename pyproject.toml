[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sensei-tutor"
dynamic = ["version"]
description = "A pip-installable CLI that scaffolds a learning-environment folder for any LLM agent to operate as an adaptive mentor."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "jsonschema>=4.18",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "mypy>=1.10",
    "ruff>=0.4",
    "types-PyYAML>=6.0",
    "types-jsonschema>=4.18",
]

[project.scripts]
sensei = "sensei.cli:main"

[tool.hatch.version]
path = "src/sensei/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/sensei"]

[tool.hatch.build.targets.sdist]
include = [
    "src/sensei",
    "README.md",
    "LICENSE",
    "CHANGELOG.md",
    "pyproject.toml",
]

[tool.mypy]
python_version = "3.10"
strict = true
packages = ["sensei"]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.ruff]
target-version = "py310"
src = ["src", "tests", "ci"]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
