# Sensei engine defaults. Learner config (learner/config.yaml) deep-merges on top of this.
# Status: scaffolding. No real tunables yet — sections are placeholders for future work.

schema_version: 0

mentor: {}      # behavioral thresholds (silence profiles, intervention rates, etc.)

learner: {}     # profile defaults (initial mastery levels, decay rates, etc.)

curriculum:
  # Curriculum graph tunables (consumed by frontier.py, mutate_graph.py, goal protocol).
  max_nodes: 30           # hard cap on total nodes per goal
  initial_size_min: 5     # minimum nodes for initial DAG generation
  initial_size_max: 12    # maximum nodes for initial DAG generation
  frontier_max: 5         # max frontier nodes to present as choices
  mastery_threshold: 0.9  # score required to complete a node

memory:
  # Review protocol tunables (consumed by protocols/review.md via decay.py).
  half_life_days: 7.0     # exponential decay half-life per topic (days)
  stale_threshold: 0.5    # freshness below this is considered stale and due for review

hints:
  # Hint ingestion tunables (consumed by protocols/hints.md via hint_decay.py).
  half_life_days: 14.0      # hint relevance decay half-life (days)
  boost_weight: 1.5         # multiplier for hinted topics in curriculum ordering
  max_boost: 2.0            # ceiling on cumulative hint boost per topic
  cluster_threshold: 3      # hints in same cluster before suggesting a deep-dive
  expire_threshold: 0.2     # freshness below this triggers expiration
  expire_after_days: 28     # hard cap: expire unacted hints after this many days
  relevance_floor: 0.3      # hints scored below this are auto-marked irrelevant

cross_goal:
  # Cross-goal intelligence tunables (consumed by goal_priority.py, session_allocator.py, review_scheduler.py).
  deadline_weight: 5.0      # urgency multiplier for imminent deadlines in goal_priority.py
  min_session_minutes: 5    # minimum per-goal time allocation in session_allocator.py
  review_dedup: true        # enable cross-goal review deduplication in review_scheduler.py

performance_training:
  # Performance phase tunables (consumed by protocols/performance-training.md via goal protocol).
  mastery_gate: solid        # minimum mastery level to enter phase (ordinal: shaky < solid < deep)
  stage_thresholds:
    automate: 3              # correct fluent recalls to advance past stage 2
    verbalize: 2             # clear verbal explanations to advance past stage 3
    time_pressure: 3         # timed problems solved within budget to advance past stage 4
    simulated_eval: 2        # scored problems passed under evaluation conditions to advance past stage 5
    full_mock: 1             # complete mock events passed to complete the performance phase
