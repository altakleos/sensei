name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
      - 'v[0-9]+.[0-9]+.[0-9]+[a-z][0-9]+'

# Force JavaScript-based actions onto Node 24 ahead of GitHub's
# 2026-09-16 deprecation deadline. Surfaces any Node-24 incompatibility
# in actions/checkout@v5 / setup-python@v5 / upload-artifact@v5 /
# download-artifact@v5 / gh-action-pypi-publish with months of runway.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -v

  build-and-check:
    name: build + check package contents
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build pyyaml

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate wheel contents against tag
        run: |
          WHEEL=$(ls dist/*.whl)
          python ci/check_package_contents.py --wheel "$WHEEL" --tag "${GITHUB_REF_NAME}"

      - name: Validate Tier-2 E2E audit log against tag
        # Per ADR-0024: the workstation-only Tier-2 gate must leave a committed,
        # CI-verifiable artifact at docs/operations/releases/<tag>.md before
        # publish. Closes the gap that survived ADR-0020's self-bypass.
        run: python ci/check_release_audit.py --tag "${GITHUB_REF_NAME}"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: build-and-check
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sensei-tutor
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC trusted publisher
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          attestations: true
