name: e2e-nightly

on:
  schedule:
    # 06:00 UTC daily (midnight CST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      tool:
        description: 'LLM tool to use (auto, claude, kiro)'
        required: false
        default: 'auto'

# Force JavaScript-based actions onto Node 24 ahead of GitHub's
# 2026-09-16 deprecation deadline. Surfaces any Node-24 incompatibility
# in actions/checkout@v5 / setup-python@v5 with months of runway.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: Tier-3 E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Cost cap: abort runaway sessions
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Install Claude Code CLI
        if: env.ANTHROPIC_API_KEY != ''
        run: npm install -g @anthropic-ai/claude-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run E2E tests
        env:
          SENSEI_E2E: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENSEI_E2E_TOOL: ${{ github.event.inputs.tool || 'auto' }}
        run: pytest tests/e2e/ -v --no-cov

      - name: Post results summary
        if: always()
        run: |
          echo "## E2E Nightly Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ran at: $(date -u)" >> $GITHUB_STEP_SUMMARY
