name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force JavaScript-based actions onto Node 24 ahead of GitHub's
# 2026-09-16 deprecation deadline. Surfaces any Node-24 incompatibility
# in actions/checkout@v5 / setup-python@v5 etc. with months of runway,
# rather than the morning the deadline hits.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -v

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy

      - name: Lint foundations layer
        run: python ci/check_foundations.py

      - name: Lint markdown links
        run: python ci/check_links.py

      - name: Lint plan completion
        run: python ci/check_plan_completion.py
