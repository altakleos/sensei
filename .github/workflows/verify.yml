name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -v --ignore=tests/e2e

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy

      - name: Verify kanon project shape
        run: kanon verify .

      - name: Lint markdown links (engine bundle)
        run: python ci/check_links.py --root src/sensei/engine

      - name: Lint ADR immutability (PR range check)
        if: github.event_name == 'pull_request'
        run: python ci/check_adr_immutability.py --base-ref "origin/${{ github.base_ref }}"
