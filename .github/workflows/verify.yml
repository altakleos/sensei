name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Force JavaScript-based actions onto Node 24 ahead of GitHub's
# 2026-09-16 deprecation deadline. Surfaces any Node-24 incompatibility
# in actions/checkout@v5 / setup-python@v5 etc. with months of runway,
# rather than the morning the deadline hits.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          # ADR-immutability gate (below) walks commit history to compare
          # ADR bodies before vs. after each commit. Default fetch-depth: 1
          # is too shallow even for the push-mode HEAD~ lookup.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -v

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy

      - name: Lint foundations layer
        run: python ci/check_foundations.py

      - name: Lint markdown links
        run: python ci/check_links.py

      - name: Lint markdown links (engine bundle)
        run: python ci/check_links.py --root src/sensei/engine

      - name: Lint changelog links
        run: python ci/check_changelog_links.py

      - name: Lint plan completion
        run: python ci/check_plan_completion.py

      - name: Lint ADR immutability
        # PR mode: walk every commit in BASE..HEAD; push-to-main mode:
        # check the just-pushed HEAD only. The gate falls back to OK
        # gracefully when the comparison range yields no commits.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python ci/check_adr_immutability.py --base-ref "origin/${{ github.base_ref }}"
          else
            python ci/check_adr_immutability.py
          fi
